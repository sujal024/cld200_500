name: Build and Deploy CAP App to Cloud Foundry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install CAP tools
        run: |
          npm install -g @sap/cds-dk mbt

      - name: Build CAP project
        run: |
          npx cds build --production
          echo "--- Checking gen/ folder ---"
          ls -la gen/ || echo "gen/ folder not found!"
          ls -la gen/db/ || echo "gen/db/ folder not found!"

      - name: Build MTA archive
        run: mbt build

      - name: Install Cloud Foundry CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github" | tar -zx
          sudo mv cf8 /usr/local/bin/cf 2>/dev/null || sudo mv cf /usr/local/bin/cf
          cf version

      - name: Install MultiApps plugin
        run: |
          cf add-plugin-repo CF-Community https://plugins.cloudfoundry.org || true
          cf install-plugin multiapps -f
          cf plugins

      - name: Login to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Check CF services
        run: |
          echo "--- Available services ---"
          cf services
          echo "--- HANA DB service detail ---"
          cf service employee-crud-app-db || echo "Service not found!"

      - name: Deploy MTA
        id: deploy_mta
        run: cf deploy mta_archives/*.mtar -f
        continue-on-error: true

      - name: Fetch DB Deployer logs on failure
        if: steps.deploy_mta.outcome == 'failure'
        run: |
          echo "--- DB Deployer recent logs ---"
          cf logs employee-crud-app-db-deployer --recent || echo "Could not fetch logs"
          echo "--- App env (check bindings) ---"
          cf env employee-crud-app-db-deployer || echo "Could not fetch env"

      - name: Fail pipeline if deploy failed
        if: steps.deploy_mta.outcome == 'failure'
        run: exit 1